<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Walking Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; 
        }

        #map {
            height: 100vh; 
            width: 100vw;  
            position: absolute;
            top: 0;
            bottom: 0;
        }

        .map-header {
            position: absolute;
            top: 10px;
            left: 50px; 
            z-index: 1000; 
            background: white;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="map-header">
        <h2 style="margin:0; font-size: 18px;">Dog Walking Map</h2>
        <p style="margin:0; font-size: 12px;">Click to add a spot</p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([51.505, -0.09], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        function onMapClick(e) {
            var spotName = prompt("Enter the name of this walking spot:");
            if (spotName) {
                L.marker(e.latlng).addTo(map)
                    .bindPopup("<b>" + spotName + "</b>")
                    .openPopup();
            }
        }

        map.on('click', onMapClick);
    </script>
</body>
</html>
