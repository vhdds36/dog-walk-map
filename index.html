<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Walking Map</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* The map needs a defined height to show up */
        #map { height: 600px; width: 100%; border-radius: 8px; }
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
    </style>
</head>
<body>

    <h2>Dog Walking Spots</h2>
    <p>Click anywhere on the map to add a new walking spot!</p>
    <div id="map"></div>

    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialize the map (centered on a default location)
        var map = L.map('map').setView([51.505, -0.09], 13);

        // 2. Add the free OpenStreetMap tile layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. Function to add a marker on click
        function onMapClick(e) {
            var spotName = prompt("Enter the name of this walking spot:");
            if (spotName) {
                L.marker(e.latlng).addTo(map)
                    .bindPopup("<b>" + spotName + "</b><br>Great for dogs!")
                    .openPopup();
            }
        }

        map.on('click', onMapClick);
    </script>
</body>
</html>
